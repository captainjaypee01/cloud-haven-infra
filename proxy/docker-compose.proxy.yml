name: cloud-haven-proxy

networks:
  webnet:
    external: true
    name: global-web-network

services:
  nginx-proxy:
    image: nginx:1.28-alpine
    container_name: nginx-proxy
    restart: unless-stopped
    volumes:
      - ./nginx/reverseproxy.dynamic.conf:/etc/nginx/conf.d/default.conf:ro
      # TLS material on host; Nginx sees /etc/letsencrypt inside the container (see README)
      - /home/deploy/letsencrypt:/etc/letsencrypt:ro
      # HTTP-01 webroot: Certbot writes on host at /home/deploy/acme-webroot → /var/www/certbot in container
      - /home/deploy/acme-webroot:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    networks: [webnet]
